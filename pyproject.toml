[project]
name = "inmet-bdmep-data"
version = "0.2.0"
description = "Coletor de dados meteorológicos do INMET-BDMEP"
authors = [
    {name = "Komesu, D.K.", email="daniel@dkko.me"},
]
requires-python = ">=3.10"
dependencies = [
    "tqdm",
    "httpx",
    "pandas",
]

[project.urls]
Homepage = "https://github.com/dankkom/inmet-bdmep-data"
Issues = "https://github.com/dankkom/inmet-bdmep-data/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/inmet_bdmep"]

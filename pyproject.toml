[project]
name = "inmet-bdmep-data"
version = "0.2.0"
description = "Coletor de dados meteorológicos do INMET-BDMEP"
authors = [
    {name = "Daniel Komesu", email="danielkomesu@gmail.com"},
]
requires-python = ">=3.10"
dependencies = [
    "tqdm",
    "httpx",
    "pandas",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true
